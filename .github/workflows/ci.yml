name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev, main]

jobs:
  test:
    name: Typecheck & unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      - run: npm ci
      - run: npm run type-check
      - run: npm test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      - name: Prepare .env for CI
        run: |
          cp .env.example .env
          cat >> .env << 'EOF'
          DIRECTUS_KEY=ci-key-32-chars-lirio-valles-crcr
          DIRECTUS_SECRET=ci-secret-32-chars-lirio-2026!!
          DIRECTUS_ADMIN_EMAIL=admin@liriodelosvallescr.org
          DIRECTUS_ADMIN_PASSWORD=CIAdmin2026!
          POSTGRES_DB=lirio_db
          POSTGRES_USER=lirio_user
          POSTGRES_PASSWORD=ci_password_2026
          REDIS_HOST=redis
          REDIS_PORT=6379
          NEXT_PUBLIC_DIRECTUS_URL=http://localhost:8055
          NEXT_PUBLIC_SITE_URL=http://localhost:3000
          AUTH_SECRET=ci-auth-secret-32-chars-lirio-2026
          NEXTAUTH_URL=http://localhost:3000
          DIRECTUS_ADMIN_TOKEN=ci-admin-token-placeholder
          DIRECTUS_DOCUMENTS_TOKEN=ci-docs-token-placeholder
          EOF

      - name: Start Directus stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d postgres redis directus
          until docker exec lirio_directus node -e \
            "require('http').get('http://localhost:8055/server/health',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(JSON.parse(d).status==='ok'?0:1))}).on('error',()=>process.exit(1))" \
            2>/dev/null; do sleep 3; done
          echo "Directus healthy"

      - name: Build & start Next.js
        working-directory: nextjs
        run: |
          npm ci
          npm run build
          npm start &
          until curl -s http://localhost:3000/api/health | grep -q '"status":"ok"'; do sleep 2; done
          echo "Next.js ready"
        env:
          NEXT_PUBLIC_DIRECTUS_URL: http://localhost:8055
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Install Playwright browsers
        working-directory: nextjs
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: nextjs
        env:
          BASE_URL: http://localhost:3000
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: nextjs/playwright-report/
          retention-days: 7
