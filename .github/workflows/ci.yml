name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nextjs/package-lock.json

      - name: Install dependencies
        working-directory: ./nextjs
        run: npm ci

      - name: Type check
        working-directory: ./nextjs
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: ./nextjs
        run: npm test

      - name: Build
        working-directory: ./nextjs
        run: npm run build
        env:
          NEXT_PUBLIC_DIRECTUS_URL: https://api.liriodelosvallescr.org
          NEXT_PUBLIC_SITE_URL: https://liriodelosvallescr.org

  e2e:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nextjs/package-lock.json

      - name: Install dependencies
        working-directory: ./nextjs
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./nextjs
        run: npx playwright install --with-deps chromium

      - name: Start test environment
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d postgres redis directus
          sleep 30

      - name: Run E2E tests
        working-directory: ./nextjs
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: nextjs/playwright-report/

  deploy:
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            cd /opt/lirio
            git pull origin main
            docker compose build nextjs
            docker compose up -d --no-deps nextjs
            docker compose ps
