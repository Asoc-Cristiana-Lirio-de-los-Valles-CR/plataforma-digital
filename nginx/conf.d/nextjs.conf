server {
    listen 80;
    server_name liriodelosvallescr.org www.liriodelosvallescr.org;

    # Cloudflare maneja HTTPS externamente (SSL Full strict)
    # Nginx recibe HTTP desde Cloudflare — solo IPs Cloudflare deben llegar aquí

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Forwarded-Proto $http_x_forwarded_proto always;

    # Ocultar versión Nginx
    server_tokens off;

    location / {
        proxy_pass http://nextjs:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Bloquear acceso directo a archivos sensibles
    location ~ /\. {
        deny all;
    }
}
